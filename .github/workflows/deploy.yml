name: CI/CD Pipeline - Docker Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Ansible
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOSTIP }}
          username: ${{ secrets.EC2_USERID }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script: |
            set -e

            echo "=== Runninh Ansible Configuration ==="
            cd ~/DockerProject/ansible
            ansible-playbook -i inventory.ini playbook.yml --ssh-extra-args='-o StrictHostKeyChecking=no'

            echo ""=== Update code and Deployed App ==='
            cd ~/DockerProject
            git reset --hard HEAD
            git pull origin main

            echo "=== Build and run Docker Container ==="
            sudo docker build -t my app:latest .
            sudo docker stop myapp || true
            sudo docker rm myapp || true
            sudo docker run -d --name myapp 80:80 --restart unless-stopped myapp-latest

            echo "=== Deployment Complete ==="
            sudo docker ps
