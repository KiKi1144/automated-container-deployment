name: CI/CD Pipeline - Docker Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOSTIP }}
          username: ${{ secrets.EC2_USERID }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script: |
            set -e

            echo "=== SSH Connection Successful ==="
            whoami
            pwd

            # Ensure project directory exists
            mkdir -p ~/DockerProject
            cd ~/DockerProject

            echo "=== Updating Code ==="
            git reset --hard HEAD
            git pull origin main || echo "Warning: Git pull failed"

            echo "=== Building Docker Image ==="
            sudo docker build -t myapp:latest .

            echo "=== Cleaning Old Container ==="
            sudo docker stop myapp || true
            sudo docker rm myapp || true

            echo "=== Starting New Container ==="
            sudo docker run -d \
              --name myapp \
              -p 80:80 \
              --restart unless-stopped \
              myapp:latest

            echo "=== Deployment Completed Successfully ==="
            sudo docker ps

            echo "=== Verifying Deployment ==="
            sleep 5
            curl -f http://localhost:80 || echo "Warning: App not responding on port 80"
