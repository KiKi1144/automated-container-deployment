name: CI/CD Pipeline - Docker Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy & Configure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOSTIP }}
          username: ${{ secrets.EC2_USERID }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script: |
            set -e

            cd ~/DockerProject

            echo "=== Running Ansible Configuration ==="
            cd ansible
            ansible-playbook -i inventory.ini playbook.yml --ssh-extra-args='-o StrictHostKeyChecking=no'

            echo "=== Updating Code and Deploying App ==="
            cd ~/DockerProject
            git reset --hard HEAD
            git pull origin main

            echo "=== Building and Running Container ==="
            sudo docker build -t myapp:latest .
            sudo docker stop myapp || true
            sudo docker rm myapp || true
            sudo docker run -d --name myapp -p 80:80 --restart unless-stopped myapp:latest

            echo "=== Deployment Completed ==="
            sudo docker ps
